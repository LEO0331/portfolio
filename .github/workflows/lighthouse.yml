name: Lighthouse Audit

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      LIGHTHOUSE_BASE_PATH: /portfolio
      LIGHTHOUSE_ORIGIN: http://127.0.0.1:4173
      SITE_URL: ${{ github.event.repository.name == format('{0}.github.io', github.repository_owner) && format('https://{0}.github.io', github.repository_owner) || format('https://{0}.github.io/{1}', github.repository_owner, github.event.repository.name) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Prepare /portfolio mount for preview
        run: |
          mkdir -p dist/portfolio
          find dist -mindepth 1 -maxdepth 1 ! -name portfolio -exec cp -R {} dist/portfolio/ \;

      - name: Lighthouse CI audit
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ env.LIGHTHOUSE_ORIGIN }}${{ env.LIGHTHOUSE_BASE_PATH }}/#/
            ${{ env.LIGHTHOUSE_ORIGIN }}${{ env.LIGHTHOUSE_BASE_PATH }}/#/projects
            ${{ env.LIGHTHOUSE_ORIGIN }}${{ env.LIGHTHOUSE_BASE_PATH }}/#/about
            ${{ env.LIGHTHOUSE_ORIGIN }}${{ env.LIGHTHOUSE_BASE_PATH }}/#/contact
            ${{ env.LIGHTHOUSE_ORIGIN }}${{ env.LIGHTHOUSE_BASE_PATH }}/#/zh
            ${{ env.LIGHTHOUSE_ORIGIN }}${{ env.LIGHTHOUSE_BASE_PATH }}/#/zh/projects
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 1
          startServerCommand: npm run preview -- --host 127.0.0.1 --port 4173
          startServerReadyPattern: 127.0.0.1:4173

      - name: Upload Lighthouse raw artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-artifacts
          path: |
            .lighthouseci
            lhci_reports
          if-no-files-found: ignore
