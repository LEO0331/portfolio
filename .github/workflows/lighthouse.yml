name: Lighthouse Audit

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      SITE_URL: ${{ github.event.repository.name == format('{0}.github.io', github.repository_owner) && format('https://{0}.github.io', github.repository_owner) || format('https://{0}.github.io/{1}', github.repository_owner, github.event.repository.name) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Prepare /portfolio mount for preview
        run: |
          mkdir -p dist/portfolio
          find dist -mindepth 1 -maxdepth 1 ! -name portfolio -exec cp -R {} dist/portfolio/ \;

      - name: Lighthouse CI audit
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.ci.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Upload Lighthouse raw artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-artifacts
          path: |
            .lighthouseci
            lhci_reports
          if-no-files-found: ignore
